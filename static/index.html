<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Recommender</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 18px 36px;
      border-bottom: 2px solid #e94560;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.6rem; color: #e94560; }

    .status {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .status.loading { background: rgba(241,196,15,.15); color: #f1c40f; }
    .status.ready   { background: rgba(39,174,96,.15);  color: #27ae60; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    .dot.pulse { animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* ── Layout ──────────────────────────────────── */
    .container { max-width: 1200px; margin: 0 auto; padding: 28px 20px; }

    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 26px;
    }
    .search-bar input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #2a2a4a;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 1rem;
      transition: border-color .2s;
    }
    .search-bar input:focus { outline: none; border-color: #e94560; }

    .btn-search {
      padding: 12px 26px;
      border-radius: 8px;
      border: none;
      background: #e94560;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-search:hover { background: #c73652; }

    .panels {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      margin-bottom: 30px;
    }
    @media (max-width: 760px) { .panels { grid-template-columns: 1fr; } }

    .panel {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 20px;
    }
    .panel h2 {
      font-size: .85rem;
      color: #7a7a9a;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    /* ── Movie items (search results) ────────────── */
    .movie-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 12px;
      border-radius: 8px;
      background: #0d0d1a;
      margin-bottom: 8px;
      transition: background .2s;
    }
    .movie-item:hover { background: #14142a; }
    .movie-info .title { font-weight: 600; font-size: .95rem; }
    .movie-info .genres { font-size: .75rem; color: #6a6a8a; margin-top: 2px; }

    .btn-add {
      flex-shrink: 0;
      padding: 5px 13px;
      border-radius: 6px;
      border: 1px solid #27ae60;
      background: transparent;
      color: #27ae60;
      font-size: .82rem;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-add:hover:not(:disabled) { background: #27ae60; color: #fff; }
    .btn-add:disabled { border-color: #3a3a5a; color: #3a3a5a; cursor: default; }

    /* ── Liked panel ─────────────────────────────── */
    .liked-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 12px;
      border-radius: 8px;
      background: #0d0d1a;
      margin-bottom: 7px;
    }
    .liked-item .title { font-size: .88rem; }
    .btn-remove {
      background: none;
      border: none;
      color: #e94560;
      cursor: pointer;
      font-size: 1rem;
      padding: 0 4px;
      line-height: 1;
    }

    .btn-recommend {
      width: 100%;
      margin-top: 14px;
      padding: 13px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #e94560, #c73652);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-recommend:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 18px rgba(233,69,96,.4);
    }
    .btn-recommend:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Recommendations ─────────────────────────── */
    .section-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after { content:''; flex:1; height:1px; background:#2a2a4a; }

    .reco-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 16px;
    }

    .reco-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 18px 16px 14px;
      position: relative;
      transition: transform .2s, border-color .2s;
    }
    .reco-card:hover { transform: translateY(-3px); border-color: #e94560; }

    .reco-rank {
      position: absolute;
      top: -10px; left: 14px;
      background: #e94560;
      color: #fff;
      font-size: .72rem;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 10px;
    }
    .reco-title { font-weight: 600; margin: 6px 0 6px; font-size: .97rem; }
    .genre-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      background: #2a2a4a;
      font-size: .72rem;
      color: #a0a0c0;
      margin: 2px 2px 0 0;
    }
    .score-bar { height: 4px; border-radius: 2px; background: #2a2a4a; margin-top: 12px; }
    .score-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg,#e94560,#f39c12); }
    .score-label { font-size: .72rem; color: #6a6a8a; margin-top: 4px; }

    .empty { text-align: center; color: #4a4a6a; padding: 28px 0; font-size: .88rem; }
  </style>
</head>
<body>

<header>
  <span style="font-size:1.8rem">🎬</span>
  <h1>Movie Recommender</h1>
  <div id="modelStatus" class="status loading">
    <div class="dot pulse"></div> Modèle en chargement…
  </div>
</header>

<div class="container">

  <!-- Search bar -->
  <div class="search-bar">
    <input
      id="searchInput"
      type="text"
      placeholder="Chercher un film… (ex : Matrix, Inception, Star Wars)"
      onkeydown="if(event.key==='Enter') searchMovies()"
    />
    <button class="btn-search" onclick="searchMovies()">Rechercher</button>
  </div>

  <!-- Two panels -->
  <div class="panels">

    <!-- Left: results -->
    <div class="panel">
      <h2>Résultats de recherche</h2>
      <div id="searchResults">
        <div class="empty">Recherchez un film pour commencer</div>
      </div>
    </div>

    <!-- Right: liked + recommend -->
    <div class="panel">
      <h2>Films aimés (<span id="likedCount">0</span>)</h2>
      <div id="likedList">
        <div class="empty">Aucun film sélectionné</div>
      </div>
      <button
        class="btn-recommend"
        id="recommendBtn"
        onclick="getRecommendations()"
        disabled
      >✨ Obtenir des recommandations</button>
    </div>

  </div>

  <!-- Recommendations -->
  <div id="recoSection" style="display:none">
    <div class="section-title">Recommandations pour vous</div>
    <div class="reco-grid" id="recoGrid"></div>
  </div>

</div>

<script>
  const liked = new Map();   // id → movie object
  let modelReady = false;

  /* ── Model status polling ─────────────────────── */
  async function checkModel() {
    try {
      const data = await fetch('/health').then(r => r.json());
      const el = document.getElementById('modelStatus');
      if (data.model_trained) {
        modelReady = true;
        el.className = 'status ready';
        el.innerHTML = '<div class="dot"></div> Modèle prêt';
        updateRecommendBtn();
      } else {
        setTimeout(checkModel, 3000);
      }
    } catch {
      setTimeout(checkModel, 5000);
    }
  }

  /* ── Search ───────────────────────────────────── */
  async function searchMovies() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return;

    const res = document.getElementById('searchResults');
    res.innerHTML = '<div class="empty">Recherche…</div>';

    try {
      const movies = await fetch(`/movies?search=${encodeURIComponent(q)}&limit=12`)
        .then(r => r.json());

      if (!movies.length) {
        res.innerHTML = '<div class="empty">Aucun résultat</div>';
        return;
      }

      res.innerHTML = movies.map(m => `
        <div class="movie-item" id="item-${m.id}">
          <div class="movie-info">
            <div class="title">${m.title}</div>
            <div class="genres">${m.genres_list.join(' · ')}</div>
          </div>
          <button
            class="btn-add"
            id="btn-${m.id}"
            onclick='addToLiked(${JSON.stringify(m)})'
            ${liked.has(m.id) ? 'disabled' : ''}
          >${liked.has(m.id) ? '✓ Ajouté' : '+ Ajouter'}</button>
        </div>
      `).join('');
    } catch {
      res.innerHTML = '<div class="empty">Erreur de connexion à l\'API</div>';
    }
  }

  /* ── Liked list ───────────────────────────────── */
  function addToLiked(movie) {
    if (liked.has(movie.id)) return;
    liked.set(movie.id, movie);
    const btn = document.getElementById(`btn-${movie.id}`);
    if (btn) { btn.disabled = true; btn.textContent = '✓ Ajouté'; }
    renderLiked();
    updateRecommendBtn();
  }

  function removeFromLiked(id) {
    liked.delete(id);
    const btn = document.getElementById(`btn-${id}`);
    if (btn) { btn.disabled = false; btn.textContent = '+ Ajouter'; }
    renderLiked();
    updateRecommendBtn();
  }

  function renderLiked() {
    document.getElementById('likedCount').textContent = liked.size;
    const list = document.getElementById('likedList');
    if (!liked.size) {
      list.innerHTML = '<div class="empty">Aucun film sélectionné</div>';
      return;
    }
    list.innerHTML = [...liked.values()].map(m => `
      <div class="liked-item">
        <span class="title">${m.title}</span>
        <button class="btn-remove" onclick="removeFromLiked(${m.id})">✕</button>
      </div>
    `).join('');
  }

  function updateRecommendBtn() {
    document.getElementById('recommendBtn').disabled = !(modelReady && liked.size > 0);
  }

  /* ── Recommendations ──────────────────────────── */
  async function getRecommendations() {
    const btn = document.getElementById('recommendBtn');
    btn.textContent = '⏳ Calcul en cours…';
    btn.disabled = true;

    try {
      const recos = await fetch('/recommend/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ liked_movie_ids: [...liked.keys()], n: 10 })
      }).then(r => r.json());

      renderRecommendations(recos);
    } catch {
      alert('Erreur lors de la récupération des recommandations.');
    } finally {
      btn.textContent = '✨ Obtenir des recommandations';
      updateRecommendBtn();
    }
  }

  function renderRecommendations(recos) {
    const maxScore = recos[0]?.score || 1;
    document.getElementById('recoGrid').innerHTML = recos.map((r, i) => `
      <div class="reco-card">
        <div class="reco-rank">#${i + 1}</div>
        <div class="reco-title">${r.movie.title}</div>
        <div>${r.movie.genres_list.map(g => `<span class="genre-tag">${g}</span>`).join('')}</div>
        <div class="score-bar">
          <div class="score-fill" style="width:${(r.score / maxScore * 100).toFixed(1)}%"></div>
        </div>
        <div class="score-label">Similarité : ${r.score.toFixed(4)}</div>
      </div>
    `).join('');

    const section = document.getElementById('recoSection');
    section.style.display = 'block';
    section.scrollIntoView({ behavior: 'smooth' });
  }

  checkModel();
</script>
</body>
</html>
